<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>新闻聚合终端</title>
    <script>
      (function() {
        var stored = localStorage.getItem('theme-mecha');
        if (stored === 'dark') {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body class="min-h-screen font-mono" style="background:var(--bg);color:var(--text)">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
